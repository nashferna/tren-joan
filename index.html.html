<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Tren de Joan 🚂</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky: #87CEEB;
  --sky2: #b8e4f7;
  --ground: #5a9e3a;
  --ground2: #4a8a2a;
  --track: #8B6914;
  --train-body: #1a5fbe;
  --train-dark: #0d3d8a;
  --train-window: #a8d8ff;
  --train-roof: #0d3d8a;
  --station-bg: #fff9e6;
  --yellow: #FFD700;
  --red: #e63946;
  --white: #ffffff;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  touch-action: manipulation;
}

/* SKY */
#sky {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #5ab4e8 0%, #87CEEB 50%, #b8e4f7 100%);
  z-index: 0;
}

/* SUN */
#sun {
  position: fixed;
  top: 30px; right: 60px;
  width: 70px; height: 70px;
  background: radial-gradient(circle, #ffe566 60%, #ffcf00 100%);
  border-radius: 50%;
  box-shadow: 0 0 40px 10px rgba(255,220,0,0.45);
  z-index: 1;
  animation: sunPulse 3s ease-in-out infinite;
}
@keyframes sunPulse { 0%,100%{box-shadow:0 0 40px 10px rgba(255,220,0,.45)} 50%{box-shadow:0 0 60px 20px rgba(255,220,0,.6)} }

/* CLOUDS */
.cloud {
  position: fixed;
  z-index: 2;
  background: white;
  border-radius: 50px;
  opacity: .9;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
#c1 { width:100px;height:40px;top:60px;left:-120px; animation: movCloud 18s linear infinite; }
#c1::before { width:50px;height:50px;top:-25px;left:15px; }
#c1::after  { width:35px;height:35px;top:-18px;left:48px; }
#c2 { width:70px;height:28px;top:100px;left:-90px; animation: movCloud 24s 6s linear infinite; }
#c2::before { width:36px;height:36px;top:-18px;left:10px; }
#c2::after  { width:25px;height:25px;top:-12px;left:35px; }
#c3 { width:90px;height:34px;top:40px;left:-110px; animation: movCloud 20s 12s linear infinite; }
#c3::before { width:44px;height:44px;top:-22px;left:12px; }
#c3::after  { width:30px;height:30px;top:-15px;left:44px; }
@keyframes movCloud { from{left:-150px} to{left:110vw} }

/* MOUNTAINS */
#mountains {
  position: fixed;
  bottom: 160px;
  width: 100%;
  z-index: 3;
}
#mountains svg { width:100%; height:140px; display:block; }

/* GROUND STRIP */
#ground {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 165px;
  background: var(--ground);
  z-index: 4;
  border-top: 6px solid var(--ground2);
}

/* FLOWERS */
.flower {
  position: absolute;
  bottom: 120px;
  font-size: 22px;
  animation: flowerBob 2s ease-in-out infinite;
}
@keyframes flowerBob { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }

/* TRACK */
#track {
  position: fixed;
  bottom: 100px;
  width: 100%;
  height: 28px;
  z-index: 5;
}
.rail {
  position: absolute;
  width: 100%;
  height: 7px;
  background: #666;
  border-radius: 4px;
}
.rail.top { top: 0; }
.rail.bot { bottom: 0; }
.sleeper {
  position: absolute;
  width: 18px;
  height: 28px;
  background: #8B6914;
  border-radius: 3px;
  top: 0;
}

/* STATION */
#station {
  position: fixed;
  z-index: 6;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: opacity .4s;
}
.station-sign {
  background: var(--train-body);
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(14px,3vw,22px);
  padding: 6px 20px;
  border-radius: 20px;
  margin-bottom: 6px;
  border: 3px solid white;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  white-space: nowrap;
}
.station-building {
  width: 120px;
  height: 70px;
  background: #fff9e6;
  border: 3px solid #ddd;
  border-radius: 8px 8px 0 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.station-roof {
  position: absolute;
  top: -22px; left: -8px;
  width: 136px; height: 28px;
  background: var(--red);
  clip-path: polygon(0 100%, 50% 0, 100% 100%);
}
.station-window {
  width: 28px; height: 28px;
  background: #a8d8ff;
  border: 2px solid #888;
  border-radius: 4px;
  margin: 0 5px;
}
.station-door {
  width: 22px; height: 38px;
  background: #8B6914;
  border: 2px solid #666;
  border-radius: 4px 4px 0 0;
  position: absolute;
  bottom: 0;
}
.station-platform {
  width: 160px; height: 14px;
  background: #ccc;
  border-radius: 4px;
}

/* TRAIN */
#train {
  position: fixed;
  bottom: 122px;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  transition: left 1.8s cubic-bezier(.4,0,.2,1);
}

/* LOCOMOTIVE */
.loco {
  position: relative;
  width: 110px;
  height: 72px;
}
.loco-body {
  position: absolute;
  bottom: 0;
  width: 110px; height: 56px;
  background: var(--train-body);
  border-radius: 10px 18px 6px 6px;
  border: 3px solid var(--train-dark);
}
.loco-front {
  position: absolute;
  right: -14px; bottom: 6px;
  width: 18px; height: 42px;
  background: var(--train-body);
  border-radius: 0 10px 10px 0;
  border: 3px solid var(--train-dark);
  border-left: none;
}
.loco-roof {
  position: absolute;
  top: 0; left: 8px;
  width: 78px; height: 22px;
  background: var(--train-roof);
  border-radius: 8px 14px 4px 4px;
  border: 3px solid var(--train-dark);
}
.loco-window {
  position: absolute;
  top: 6px; right: 22px;
  width: 30px; height: 26px;
  background: var(--train-window);
  border-radius: 6px;
  border: 3px solid var(--train-dark);
}
.loco-stripe {
  position: absolute;
  bottom: 12px; left: 0;
  width: 100%; height: 10px;
  background: var(--yellow);
  border-radius: 0;
}
.chimney {
  position: absolute;
  top: -14px; left: 20px;
  width: 16px; height: 18px;
  background: var(--train-dark);
  border-radius: 4px 4px 0 0;
}
.loco-light {
  position: absolute;
  right: -6px; bottom: 18px;
  width: 12px; height: 12px;
  background: var(--yellow);
  border-radius: 50%;
  border: 2px solid var(--train-dark);
  box-shadow: 0 0 8px 4px rgba(255,220,0,.5);
}
.wheel {
  position: absolute;
  bottom: -10px;
  width: 24px; height: 24px;
  background: #333;
  border-radius: 50%;
  border: 3px solid #666;
  animation: spin 0.4s linear infinite paused;
}
.wheel::after {
  content:'';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:8px;height:8px;
  background:#aaa;
  border-radius:50%;
}
.w1 { left: 8px; }
.w2 { left: 38px; }
.w3 { left: 68px; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* WAGON */
.wagon {
  position: relative;
  width: 86px;
  height: 58px;
}
.wagon-body {
  position: absolute;
  bottom: 0;
  width: 86px; height: 48px;
  background: var(--train-body);
  border-radius: 6px;
  border: 3px solid var(--train-dark);
}
.wagon-window {
  position: absolute;
  top: 6px;
  width: 22px; height: 20px;
  background: var(--train-window);
  border-radius: 4px;
  border: 2px solid var(--train-dark);
}
.ww1 { left: 10px; }
.ww2 { left: 40px; }
.wagon-stripe {
  position: absolute;
  bottom: 10px; left: 0;
  width: 100%; height: 8px;
  background: var(--yellow);
}
.wagon-roof {
  position: absolute;
  top: 0; left: 4px;
  width: 78px; height: 14px;
  background: var(--train-roof);
  border-radius: 6px 6px 2px 2px;
  border: 2px solid var(--train-dark);
}
.ww { position: absolute; bottom: -10px; }
.ww.wl { left: 8px; }
.ww.wr { left: 50px; }

/* SMOKE */
.smoke {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,255,255,.85);
  z-index: 9;
  pointer-events: none;
  animation: floatSmoke 2s ease-out forwards;
}
@keyframes floatSmoke {
  0%   { opacity:.8; transform: scale(.5) translate(0,0); }
  100% { opacity:0;  transform: scale(2.5) translate(-20px,-60px); }
}

/* UI OVERLAY */
#ui {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 20;
  padding: 16px 20px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}

#title-box {
  background: rgba(255,255,255,.92);
  border-radius: 20px;
  padding: 10px 28px;
  border: 4px solid var(--train-body);
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
  text-align: center;
}
#title-box h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(22px,5vw,38px);
  color: var(--train-body);
  line-height: 1.1;
}
#title-box p {
  font-size: clamp(13px,2.5vw,17px);
  color: #555;
  font-weight: 700;
}

/* STATION POPUP */
#popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.7);
  z-index: 30;
  background: white;
  border-radius: 24px;
  padding: 28px 36px;
  text-align: center;
  border: 5px solid var(--train-body);
  box-shadow: 0 8px 40px rgba(0,0,0,.25);
  opacity: 0;
  pointer-events: none;
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  max-width: 90vw;
}
#popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: all;
}
#popup-emoji { font-size: 56px; margin-bottom: 8px; }
#popup-station { font-family: 'Fredoka One', cursive; font-size: clamp(22px,5vw,34px); color: var(--train-body); margin-bottom: 6px; }
#popup-fact { font-size: clamp(13px,2.5vw,16px); color: #555; font-weight: 700; margin-bottom: 20px; max-width: 300px; margin-left: auto; margin-right: auto; }
#popup-btn {
  background: var(--train-body);
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(18px,4vw,26px);
  border: none;
  border-radius: 50px;
  padding: 12px 40px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  transition: transform .15s, box-shadow .15s;
  pointer-events: all;
}
#popup-btn:active { transform: scale(.96); box-shadow: 0 2px 6px rgba(0,0,0,.2); }

/* PROGRESS DOTS */
#dots {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  gap: 10px;
  align-items: center;
}
.dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,.4);
  border: 2px solid rgba(255,255,255,.6);
  transition: all .3s;
}
.dot.done { background: var(--train-body); border-color: white; transform: scale(1.2); }
.dot.current { background: var(--yellow); border-color: white; transform: scale(1.3); }

/* CONFETTI */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  z-index: 50;
  pointer-events: none;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0%   { opacity:1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
}

/* FINAL SCREEN */
#final {
  position: fixed;
  inset: 0;
  z-index: 40;
  background: rgba(26,95,190,.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .6s;
  text-align: center;
  padding: 24px;
}
#final.show { opacity:1; pointer-events:all; }
#final h2 { font-family:'Fredoka One',cursive; font-size:clamp(32px,7vw,60px); color:white; line-height:1.1; margin-bottom:12px; }
#final p { font-size:clamp(16px,3vw,22px); color:rgba(255,255,255,.9); font-weight:700; margin-bottom:28px; }
#restart-btn {
  background: var(--yellow);
  color: var(--train-dark);
  font-family: 'Fredoka One', cursive;
  font-size: clamp(18px,4vw,28px);
  border: none;
  border-radius: 50px;
  padding: 14px 48px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
}

</style>
</head>
<body>

<div id="sky"></div>
<div id="sun"></div>
<div class="cloud" id="c1"></div>
<div class="cloud" id="c2"></div>
<div class="cloud" id="c3"></div>

<div id="mountains">
  <svg viewBox="0 0 1440 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,140 200,20 400,140" fill="#6aab4a" opacity=".7"/>
    <polygon points="150,140 380,10 600,140" fill="#5a9e3a" opacity=".9"/>
    <polygon points="400,140 620,40 840,140" fill="#6aab4a" opacity=".7"/>
    <polygon points="600,140 850,5  1060,140" fill="#5a9e3a"/>
    <polygon points="900,140 1100,30 1300,140" fill="#6aab4a" opacity=".8"/>
    <polygon points="1100,140 1300,20 1440,140" fill="#5a9e3a"/>
  </svg>
</div>

<div id="ground">
  <div class="flower" style="left:8%">🌻</div>
  <div class="flower" style="left:18%;animation-delay:.4s">🌸</div>
  <div class="flower" style="left:32%;animation-delay:.8s">🌼</div>
  <div class="flower" style="left:48%;animation-delay:.2s">🌻</div>
  <div class="flower" style="left:62%;animation-delay:1s">🌷</div>
  <div class="flower" style="left:75%;animation-delay:.6s">🌸</div>
  <div class="flower" style="left:88%;animation-delay:.3s">🌼</div>
</div>

<div id="track"></div>

<div id="station">
  <div class="station-sign" id="station-sign">Retiro</div>
  <div class="station-building">
    <div class="station-roof"></div>
    <div class="station-window"></div>
    <div class="station-window"></div>
    <div class="station-door"></div>
  </div>
  <div class="station-platform"></div>
</div>

<!-- TRAIN -->
<div id="train">
  <div class="loco">
    <div class="chimney"></div>
    <div class="loco-roof"></div>
    <div class="loco-body">
      <div class="loco-stripe"></div>
      <div class="loco-window"></div>
      <div class="loco-light"></div>
    </div>
    <div class="loco-front"></div>
    <div class="wheel w1"></div>
    <div class="wheel w2"></div>
    <div class="wheel w3"></div>
  </div>
  <div class="wagon">
    <div class="wagon-roof"></div>
    <div class="wagon-body">
      <div class="wagon-stripe"></div>
      <div class="wagon-window ww1"></div>
      <div class="wagon-window ww2"></div>
    </div>
    <div class="wheel ww wl"></div>
    <div class="wheel ww wr"></div>
  </div>
  <div class="wagon">
    <div class="wagon-roof"></div>
    <div class="wagon-body">
      <div class="wagon-stripe"></div>
      <div class="wagon-window ww1"></div>
      <div class="wagon-window ww2"></div>
    </div>
    <div class="wheel ww wl"></div>
    <div class="wheel ww wr"></div>
  </div>
</div>

<!-- UI -->
<div id="ui">
  <div id="title-box">
    <h1>🚂 El Tren de Joan</h1>
    <p>Línea Mitre · Buenos Aires</p>
  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popup-emoji">🚉</div>
  <div id="popup-station">Retiro</div>
  <div id="popup-fact">¡Llegamos a la estación!</div>
  <button id="popup-btn" onclick="nextStation()">¡Siguiente parada! 🚂</button>
</div>

<!-- FINAL -->
<div id="final">
  <div style="font-size:72px;margin-bottom:16px">🎉🚂🎉</div>
  <h2>¡Bravo, Joan!</h2>
  <p>¡Recorriste todas las estaciones<br>del Tren Mitre!</p>
  <button id="restart-btn" onclick="restart()">¡Viajar de nuevo! 🚂</button>
</div>

<!-- DOTS -->
<div id="dots"></div>

<script>
const stations = [
  { name: "Retiro",       emoji: "🏙️", fact: "¡La estación más grande de Buenos Aires!", color: "#1a5fbe" },
  { name: "Palermo",      emoji: "🌳", fact: "¡Tiene el parque más lindo de la ciudad!",  color: "#2e7d32" },
  { name: "Belgrano",     emoji: "🏘️", fact: "¡Hay una iglesia muy muy antigua aquí!",   color: "#6a1a9a" },
  { name: "Núñez",        emoji: "⚽", fact: "¡Cerca del estadio del River Plate!",       color: "#c62828" },
  { name: "Olivos",       emoji: "🌿", fact: "¡Tiene un río muy bonito para ver!",        color: "#1b5e20" },
  { name: "San Isidro",   emoji: "⛪", fact: "¡Hay una catedral muy grande aquí!",        color: "#4527a0" },
  { name: "Tigre",        emoji: "🛶", fact: "¡El final del viaje — hay ríos y botes!",   color: "#e65100" },
];

let current = 0;
let moving = false;
const train = document.getElementById('train');
const popup = document.getElementById('popup');
const stationSign = document.getElementById('station-sign');
let smokeInterval = null;

// Build track sleepers
const track = document.getElementById('track');
const railTop = document.createElement('div'); railTop.className='rail top'; track.appendChild(railTop);
const railBot = document.createElement('div'); railBot.className='rail bot'; track.appendChild(railBot);
for(let i=0; i<Math.ceil(window.innerWidth/32)+2; i++){
  const s = document.createElement('div');
  s.className = 'sleeper';
  s.style.left = (i*32)+'px';
  track.appendChild(s);
}

// Build dots
const dotsEl = document.getElementById('dots');
stations.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' current':'');
  d.id = 'dot-'+i;
  dotsEl.appendChild(d);
});

// Train start position
const trainW = 300;
train.style.left = (window.innerWidth/2 - trainW/2 - 80) + 'px';

function updateDots(){
  stations.forEach((_,i)=>{
    const d = document.getElementById('dot-'+i);
    d.className = 'dot' + (i < current ? ' done' : i===current ? ' current' : '');
  });
}

function showPopup(){
  const s = stations[current];
  document.getElementById('popup-emoji').textContent = s.emoji;
  document.getElementById('popup-station').textContent = s.name;
  document.getElementById('popup-fact').textContent = s.fact;
  document.getElementById('popup-btn').textContent =
    current < stations.length-1 ? '¡Siguiente parada! 🚂' : '¡Ver el final! 🎉';
  stationSign.textContent = s.name;
  popup.classList.add('show');
  stopSmoke();
  stopWheels();
}

function nextStation(){
  popup.classList.remove('show');
  if(current >= stations.length-1){
    setTimeout(showFinal, 400);
    return;
  }
  current++;
  updateDots();
  setTimeout(depart, 400);
}

function depart(){
  if(moving) return;
  moving = true;
  startWheels();
  startSmoke();

  // Move train off screen right → then reposition left → arrive center
  const screenW = window.innerWidth;
  train.style.transition = 'left 1.4s cubic-bezier(.4,0,.6,1)';
  train.style.left = screenW + 60 + 'px';

  setTimeout(()=>{
    // Instantly reposition off left
    train.style.transition = 'none';
    train.style.left = (-trainW - 80) + 'px';
    stationSign.textContent = stations[current].name;

    setTimeout(()=>{
      // Arrive at center
      train.style.transition = 'left 1.8s cubic-bezier(.2,0,.2,1)';
      train.style.left = (screenW/2 - trainW/2 - 80) + 'px';

      setTimeout(()=>{
        moving = false;
        showPopup();
      }, 1900);
    }, 80);
  }, 1450);
}

function startWheels(){
  document.querySelectorAll('.wheel').forEach(w => w.style.animationPlayState='running');
}
function stopWheels(){
  document.querySelectorAll('.wheel').forEach(w => w.style.animationPlayState='paused');
}

function startSmoke(){
  smokeInterval = setInterval(()=>{
    const trainRect = train.getBoundingClientRect();
    const x = trainRect.left + 28;
    const y = trainRect.top + 2;
    const s = document.createElement('div');
    s.className = 'smoke';
    const size = 16 + Math.random()*14;
    s.style.cssText = `left:${x + (Math.random()-0.5)*10}px;top:${y}px;width:${size}px;height:${size}px;`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 2100);
  }, 220);
}
function stopSmoke(){ clearInterval(smokeInterval); }

function showFinal(){
  launchConfetti();
  document.getElementById('final').classList.add('show');
}

function launchConfetti(){
  const colors = ['#1a5fbe','#FFD700','#e63946','#5a9e3a','#ff6b35','#a855f7','#06b6d4'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.animationDelay = Math.random()*1+'s';
      el.style.animationDuration = (2+Math.random()*2)+'s';
      if(Math.random()>.5) el.style.borderRadius='50%';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 4000);
    }, i*40);
  }
}

function restart(){
  current = 0;
  document.getElementById('final').classList.remove('show');
  stationSign.textContent = stations[0].name;
  train.style.transition = 'none';
  train.style.left = (window.innerWidth/2 - trainW/2 - 80) + 'px';
  updateDots();
  setTimeout(()=>showPopup(), 300);
}

// Kick off — show first station popup after short delay
setTimeout(()=>showPopup(), 900);
</script>
</body>
</html>
