<title>Barrera Ferroviaria - Av. Nazca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}
#scene{width:100%;max-width:700px;margin:0 auto;position:relative;height:460px;overflow:hidden;border-radius:12px;}
#sky{position:absolute;inset:0;background:linear-gradient(180deg,#c0d8ee 0%,#ddeef8 55%,#e8f4fc 100%);}
.cloud{position:absolute;background:#fff;border-radius:40px;opacity:.85;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
#cl1{width:80px;height:26px;top:22px;left:-100px;animation:movCl 22s linear infinite;}
#cl1::before{width:36px;height:36px;top:-17px;left:10px;}#cl1::after{width:26px;height:26px;top:-12px;left:36px;}
#cl2{width:55px;height:18px;top:50px;left:-80px;animation:movCl 30s 9s linear infinite;}
#cl2::before{width:24px;height:24px;top:-12px;left:8px;}#cl2::after{width:18px;height:18px;top:-8px;left:24px;}
#cl3{width:68px;height:22px;top:14px;left:-90px;animation:movCl 26s 15s linear infinite;}
#cl3::before{width:30px;height:30px;top:-14px;left:10px;}#cl3::after{width:22px;height:22px;top:-9px;left:30px;}
@keyframes movCl{from{left:-130px}to{left:110%}}
#cables{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;}
#city{position:absolute;bottom:120px;left:0;width:100%;}
#city svg{width:100%;height:260px;display:block;}
#sidewalk{position:absolute;bottom:112px;width:100%;height:8px;background:#888;}
#baldosas{position:absolute;bottom:84px;width:100%;height:28px;background:repeating-linear-gradient(90deg,#b0afa8 0,#b0afa8 36px,#9e9d96 36px,#9e9d96 38px);}
#road{position:absolute;bottom:0;width:100%;height:84px;background:#4a4a4a;}
#road-line{position:absolute;bottom:38px;width:100%;height:4px;background:repeating-linear-gradient(90deg,#f0d040 0,#f0d040 26px,transparent 26px,transparent 52px);}
#road-line2{position:absolute;bottom:22px;width:100%;height:3px;background:repeating-linear-gradient(90deg,#f0d040 0,#f0d040 26px,transparent 26px,transparent 52px);}
#track{position:absolute;bottom:78px;width:100%;z-index:6;}
.rail{position:absolute;width:100%;height:6px;background:#777;border-radius:3px;}
.rail.top{bottom:24px;}.rail.bot{bottom:8px;}
.sleeper-el{position:absolute;bottom:4px;width:14px;height:28px;background:#6B4810;border-radius:2px;}
.third-rail{position:absolute;bottom:2px;width:100%;height:4px;background:#444;}
#post-lights{position:absolute;left:185px;bottom:104px;width:9px;height:185px;background:#444;border-radius:4px 4px 0 0;z-index:9;}
#light-arm{position:absolute;top:0;left:9px;width:52px;height:9px;background:#444;border-radius:0 4px 4px 0;}
.light-box{position:absolute;top:-7px;width:20px;height:46px;background:#222;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:4px 0;}
.lb1{right:-3px;}.lb2{right:26px;}
.led{width:12px;height:12px;border-radius:50%;background:#3a0000;}
.led.on{background:#ff1818;box-shadow:0 0 10px 5px rgba(255,15,15,.85);}
#post-barrier{position:absolute;left:298px;bottom:104px;width:11px;height:175px;background:#444;border-radius:4px 4px 0 0;z-index:9;}
#cross{position:absolute;left:284px;bottom:275px;z-index:10;}
.cx{position:absolute;width:36px;height:8px;background:#c01c00;border-radius:4px;top:14px;left:0;}
.cy{position:absolute;width:8px;height:36px;background:#c01c00;border-radius:4px;top:0;left:14px;}
#barrier-pivot{position:absolute;left:298px;bottom:277px;z-index:11;transform-origin:left center;transform:rotate(0deg);transition:transform 1.2s cubic-bezier(.4,0,.2,1);}
#barrier-arm{position:absolute;left:5px;top:-7px;width:215px;height:13px;background:repeating-linear-gradient(90deg,#e01010 0,#e01010 22px,#f2f2f2 22px,#f2f2f2 44px);border-radius:0 6px 6px 0;border:2px solid #999;}
#barrier-arm::before{content:'';position:absolute;left:-13px;top:0;width:13px;height:13px;background:#444;border-radius:50%;border:2px solid #777;}
#train{position:absolute;bottom:98px;left:-650px;display:flex;align-items:flex-end;gap:2px;z-index:12;transition:left 4.2s linear;}
.cab{position:relative;width:88px;height:66px;}
.cab-roof-el{position:absolute;top:-9px;left:0;width:88px;height:13px;background:#777;border-radius:3px 3px 0 0;}
.cab-body-el{position:absolute;bottom:0;width:88px;height:56px;background:#e8c800;border:2px solid #c4a800;border-radius:3px 3px 0 0;}
.cab-grey{position:absolute;bottom:10px;left:0;width:88px;height:13px;background:#999;}
.cab-win{position:absolute;top:7px;left:8px;width:48px;height:24px;background:#b8daee;border-radius:3px;border:1.5px solid #555;}
.cab-front-v{position:absolute;right:-15px;bottom:0;width:16px;height:56px;overflow:hidden;}
.wc{position:absolute;bottom:-9px;width:19px;height:19px;background:#2a2a2a;border-radius:50%;border:2px solid #555;}
.wc::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#aaa;border-radius:50%;}
.panto-c{position:absolute;top:-22px;left:28px;width:36px;height:20px;}
.pl{position:absolute;background:#333;border-radius:1px;}
.wag{position:relative;width:116px;height:60px;}
.wag-roof{position:absolute;top:-9px;left:0;width:116px;height:13px;background:#777;border-radius:2px;}
.wag-body{position:absolute;bottom:0;width:116px;height:50px;background:#e8c800;border:2px solid #c4a800;border-radius:2px;}
.wag-grey{position:absolute;bottom:8px;left:0;width:116px;height:13px;background:#999;}
.wag-win{position:absolute;top:6px;width:20px;height:20px;background:#b8daee;border:1.5px solid #555;border-radius:2px;}
.wag-door{position:absolute;top:4px;width:14px;height:36px;background:#d4aa00;border:1.5px solid #b89a00;border-radius:1px;}
.ww{position:absolute;bottom:-9px;width:19px;height:19px;background:#2a2a2a;border-radius:50%;border:2px solid #555;}
.ww::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#aaa;border-radius:50%;}
.running .wc,.running .ww{animation:wspin .3s linear infinite;}
@keyframes wspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
#btn-wrap{position:absolute;bottom:10px;width:100%;display:flex;justify-content:center;z-index:20;gap:10px;}
button{background:rgba(255,255,255,0.92);color:#222;border:1px solid #bbb;border-radius:20px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:sans-serif;font-weight:600;transition:background .15s;}
button:hover{background:#fff;}
button:disabled{opacity:.4;cursor:default;}
</style>

// ======= CANVAS TRAFFIC =======
const canvas=document.getElementById('trafficCanvas');
const ctx2d=canvas.getContext('2d');
function resizeCanvas(){const s=document.getElementById('scene');canvas.width=s.offsetWidth;canvas.height=84;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

const carPalettes=[
  {body:'#c0392b',roof:'#96281b',glass:'#aaddee'},
  {body:'#2471a3',roof:'#1a5480',glass:'#b0d8f0'},
  {body:'#888',roof:'#555',glass:'#cce'},
  {body:'#229954',roof:'#186a3b',glass:'#aaeecc'},
  {body:'#d4ac0d',roof:'#9a7d0a',glass:'#ffeebb'},
  {body:'#eee',roof:'#bbb',glass:'#d0eeff'},
  {body:'#7d3c98',roof:'#5b2c6f',glass:'#d7bde2'},
  {body:'#e67e22',roof:'#b9770e',glass:'#ffe0aa'},
  {body:'#1a252f',roof:'#111',glass:'#5dade2'},
  {body:'#a04000',roof:'#784212',glass:'#f0d9b5'},
];

function drawCar(x,y,w,h,palette,flipped){
  const c=ctx2d;c.save();
  if(flipped){c.translate(x+w,y);c.scale(-1,1);x=0;}else{c.translate(x,y);}
  const bh=Math.round(h*.52),ch=Math.round(h*.42),cy_off=Math.round(h*.06);
  c.fillStyle='rgba(0,0,0,0.18)';c.beginPath();c.ellipse(w/2,h+2,w*.42,4,0,0,Math.PI*2);c.fill();
  c.fillStyle=palette.body;c.beginPath();c.roundRect(0,h-bh,w,bh,[4,4,3,3]);c.fill();
  c.fillStyle=palette.roof;const cabX=Math.round(w*.16),cabW=Math.round(w*.68);
  c.beginPath();c.roundRect(cabX,cy_off,cabW,ch,[5,5,2,2]);c.fill();
  c.fillStyle=palette.glass;c.globalAlpha=0.82;
  c.beginPath();c.roundRect(cabX+cabW-Math.round(cabW*.32),cy_off+3,Math.round(cabW*.28),ch-7,[2]);c.fill();
  c.beginPath();c.roundRect(cabX+4,cy_off+3,Math.round(cabW*.32),ch-7,[2]);c.fill();
  c.globalAlpha=1;
  c.fillStyle='rgba(255,255,255,0.22)';c.fillRect(0,h-bh+Math.round(bh*.28),w,3);
  c.fillStyle='#fffde0';c.beginPath();c.roundRect(w-8,h-bh+6,8,10,[2]);c.fill();
  c.fillStyle='#cc2200';c.beginPath();c.roundRect(0,h-bh+6,7,10,[2]);c.fill();
  const wy=h-4,wr=Math.round(h*.22);
  [Math.round(w*.2),Math.round(w*.75)].forEach(wx=>{
    c.fillStyle='#1a1a1a';c.beginPath();c.arc(wx,wy,wr,0,Math.PI*2);c.fill();
    c.fillStyle='#888';c.beginPath();c.arc(wx,wy,Math.round(wr*.62),0,Math.PI*2);c.fill();
    c.fillStyle='#555';c.beginPath();c.arc(wx,wy,Math.round(wr*.28),0,Math.PI*2);c.fill();
  });
  c.fillStyle=palette.roof;c.fillRect(w-10,h-bh+2,4,4);
  c.restore();
}

function drawBus(x,y,w,h,flipped){
  const c=ctx2d;c.save();
  if(flipped){c.translate(x+w,y);c.scale(-1,1);x=0;}else{c.translate(x,y);}
  c.fillStyle='rgba(0,0,0,0.2)';c.beginPath();c.ellipse(w/2,h+3,w*.44,5,0,0,Math.PI*2);c.fill();
  c.fillStyle='#e86c00';c.beginPath();c.roundRect(0,0,w,h,[3,3,0,0]);c.fill();
  c.fillStyle='#d0d0d0';c.beginPath();c.roundRect(0,-8,w,12,[4,4,0,0]);c.fill();
  c.fillStyle='rgba(255,255,255,0.55)';c.fillRect(0,h-Math.round(h*.32),w,5);
  c.fillStyle='#c05000';c.beginPath();c.roundRect(w-14,0,14,h,[0,3,0,0]);c.fill();
  c.fillStyle='rgba(160,220,240,0.78)';c.beginPath();c.roundRect(w-12,4,10,Math.round(h*.42),[2]);c.fill();
  c.fillStyle='#fffde0';c.beginPath();c.roundRect(w-12,h-22,10,8,[2]);c.fill();
  c.fillStyle='rgba(160,220,240,0.75)';
  const winCount=4,winW=Math.round((w-30)/winCount)-4;
  for(let i=0;i<winCount;i++){c.beginPath();c.roundRect(6+i*(winW+4),5,winW,Math.round(h*.42),[2]);c.fill();}
  c.fillStyle='rgba(0,0,0,0.18)';c.beginPath();c.roundRect(8,Math.round(h*.18),10,Math.round(h*.62),[1]);c.fill();
  c.strokeStyle='rgba(0,0,0,0.35)';c.lineWidth=1;c.beginPath();c.moveTo(13,Math.round(h*.18));c.lineTo(13,Math.round(h*.8));c.stroke();
  c.fillStyle='white';c.font='bold 11px sans-serif';c.fillText('110',w-38,h-6);
  c.fillStyle='#111';c.beginPath();c.roundRect(w-42,h-20,28,12,[2]);c.fill();
  c.fillStyle='#ffee00';c.font='bold 7px monospace';c.fillText('110',w-39,h-11);
  const wy=h+6,wr=9;
  [Math.round(w*.15),Math.round(w*.82)].forEach(wx=>{
    c.fillStyle='#1a1a1a';c.beginPath();c.arc(wx,wy,wr,0,Math.PI*2);c.fill();
    c.fillStyle='#777';c.beginPath();c.arc(wx,wy,6,0,Math.PI*2);c.fill();
    c.fillStyle='#444';c.beginPath();c.arc(wx,wy,3,0,Math.PI*2);c.fill();
  });
  c.restore();
}

const BARRIER_X=298;
let vehicles=[],barrierDown=false;
function spawnVehicle(){
  const W=canvas.width,is110=Math.random()<0.28,dir=Math.random()<0.5?1:-1;
  const lane=dir===1?0:1,laneY=lane===0?44:12;
  const vw=is110?80:(42+Math.floor(Math.random()*18)),vh=is110?46:26;
  const startX=dir===1?-vw-10:W+10,speed=(2.2+Math.random()*1.6)*dir;
  const pal=is110?null:carPalettes[Math.floor(Math.random()*carPalettes.length)];
  vehicles.push({x:startX,y:laneY,w:vw,h:vh,speed,dir,is110,pal,stopped:false,wasReleased:false});
}

function tickAndDraw(){
  const W=canvas.width;ctx2d.clearRect(0,0,W,84);
  vehicles=vehicles.filter(v=>{
    if(v.dir===1&&v.x>W+100)return false;
    if(v.dir===-1&&v.x<-v.w-100)return false;
    if(barrierDown){
      if(v.dir===1&&!v.stopped&&v.x+v.w+26>=BARRIER_X)v.stopped=true;
      if(v.dir===-1&&!v.stopped&&v.x<=BARRIER_X+30)v.stopped=true;
    } else {
      if(v.stopped){v.stopped=false;if(!v.wasReleased){v.wasReleased=true;fireAccel();}}
    }
    if(v.stopped)anyStopped=true;
    if(!v.stopped)v.x+=v.speed;
    if(v.is110)drawBus(v.x,v.y,v.w,v.h,v.dir===-1);
    else drawCar(v.x,v.y,v.w,v.h,v.pal,v.dir===-1);
    return true;
  });
  anyStopped=false;
  requestAnimationFrame(tickAndDraw);
}
let anyStopped=false;
for(let i=0;i<5;i++)setTimeout(()=>spawnVehicle(),i*550);
setInterval(()=>{if(vehicles.length<10)spawnVehicle();},1600);
requestAnimationFrame(tickAndDraw);

  leds.forEach(l=>l.classList.remove('on'));blinkS=false;

    blinkS=!blinkS;
    leds[0].classList.toggle('on',blinkS);leds[3].classList.toggle('on',blinkS);
    leds[1].classList.toggle('on',!blinkS);leds[2].classList.toggle('on',!blinkS);
  },420);
}
function stopBlink(){clearInterval(blinkI);blinkI=null;leds.forEach(l=>l.classList.remove('on'));}

let trenAudioBuffer=null;
let trenAudioSource=null;

function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

async function loadTrenAudio(){
  try{
    const ctx=getCtx();
    const bin=atob(TREN_B64);
    const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    trenAudioBuffer=await ctx.decodeAudioData(arr.buffer);
  }catch(e){console.warn('Error cargando audio tren:',e);}
}

function playTrenSound(){
  if(!soundEnabled||!trenAudioBuffer)return;
  const ctx=getCtx();
  trenAudioSource=ctx.createBufferSource();
  trenAudioSource.buffer=trenAudioBuffer;
  // Fade in/out suave
  const gain=ctx.createGain();
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.85,ctx.currentTime+0.8);
  gain.gain.setValueAtTime(0.85,ctx.currentTime+8);
  gain.gain.linearRampToValueAtTime(0,ctx.currentTime+10.5);
  trenAudioSource.connect(gain);gain.connect(ctx.destination);
  trenAudioSource.start(ctx.currentTime);
}

function stopTrenSound(){
  if(trenAudioSource){try{trenAudioSource.stop();}catch(e){}trenAudioSource=null;}
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  document.getElementById('sound-btn').textContent=soundEnabled?'🔊 Sonido ON':'🔇 Activar sonido';
  if(soundEnabled){getCtx();if(!trenAudioBuffer)loadTrenAudio();}
}

function playBell(){
  if(!soundEnabled)return;
  const freqs=[880,660];let bi=0;
  bellI=setInterval(()=>{
    const c=getCtx();const osc=c.createOscillator(),g=c.createGain();
    osc.connect(g);g.connect(c.destination);
    osc.type='sine';osc.frequency.value=freqs[bi%2];
    g.gain.setValueAtTime(0.38,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.48);
    osc.start(c.currentTime);osc.stop(c.currentTime+0.5);bi++;
  },520);
}
function stopBell(){clearInterval(bellI);bellI=null;}

function playCarHorn(delay){
  if(!soundEnabled)return;
  setTimeout(()=>{
    const c=getCtx();
    [392,494].forEach(fr=>{
      const o=c.createOscillator(),g=c.createGain(),d=c.createWaveShaper();
      const curve=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x*(Math.PI+50)/(Math.PI+50*Math.abs(x));}
      d.curve=curve;o.connect(d);d.connect(g);g.connect(c.destination);
      o.type='sawtooth';o.frequency.value=fr;
      g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.14,c.currentTime+0.04);
      g.gain.setValueAtTime(0.14,c.currentTime+0.22);g.gain.linearRampToValueAtTime(0,c.currentTime+0.32);
      o.start(c.currentTime);o.stop(c.currentTime+0.35);
    });
  },delay);
}
function playBusHorn(delay){
  if(!soundEnabled)return;
  setTimeout(()=>{
    const c=getCtx();
    [196,247].forEach(fr=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=fr;
      g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.18,c.currentTime+0.06);
      g.gain.setValueAtTime(0.18,c.currentTime+0.6);g.gain.linearRampToValueAtTime(0,c.currentTime+0.75);
      o.start(c.currentTime);o.stop(c.currentTime+0.8);
    });
  },delay);
}
function fireHorns(){if(hornsFired)return;hornsFired=true;playCarHorn(1100);playCarHorn(2200);playBusHorn(3100);}
function playAccel(){
  if(!soundEnabled)return;
  const c=getCtx(),dur=0.9;
  const buf=c.createBuffer(1,Math.floor(c.sampleRate*dur),c.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=c.createBufferSource();src.buffer=buf;
  const f=c.createBiquadFilter();f.type='bandpass';
  f.frequency.setValueAtTime(150,c.currentTime);f.frequency.linearRampToValueAtTime(400,c.currentTime+dur);f.Q.value=1.0;
  const g=c.createGain();
  g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.28,c.currentTime+0.1);
  g.gain.setValueAtTime(0.28,c.currentTime+0.55);g.gain.linearRampToValueAtTime(0,c.currentTime+dur);
  src.connect(f);f.connect(g);g.connect(c.destination);src.start();src.stop(c.currentTime+dur+0.05);
}
function fireAccel(){if(accelFired)return;accelFired=true;setTimeout(()=>playAccel(),80);}

let hornCheckI=null;
function startHornCheck(){hornCheckI=setInterval(()=>{if(vehicles.some(v=>v.stopped))fireHorns();},500);}
function stopHornCheck(){clearInterval(hornCheckI);}

// ======= TREN =======
const barrier=document.getElementById('barrier-pivot');
const trainEl=document.getElementById('train');
const btn=document.getElementById('train-btn');
let running=false;

function pasarTren(){
  if(running)return;
  running=true;btn.disabled=true;
  hornsFired=false;accelFired=false;

  // 0ms — el tren se empieza a escuchar a lo lejos
  playTrenSound();

  // 1800ms — campana y barrera bajan
  setTimeout(()=>{playBell();},1800);
  setTimeout(()=>{barrier.style.transform='rotate(85deg)';barrierDown=true;startBlink();},2200);

  // 3200ms — bocinas de los autos impacientes (tráfico ya está frenado)
  setTimeout(()=>{startHornCheck();},3200);

  // 3800ms — el tren aparece visualmente
  setTimeout(()=>{
    trainEl.classList.add('running');
    trainEl.style.transition='left 4.4s linear';
    trainEl.style.left=(document.getElementById('scene').offsetWidth+60)+'px';
  },3800);

  // 8200ms — barrera sube, tráfico arranca
  setTimeout(()=>{
    barrier.style.transform='rotate(0deg)';barrierDown=false;
    stopBlink();stopBell();stopHornCheck();
    accelFired=false;fireAccel();
  },8200);

  // 8800ms — reset tren
  setTimeout(()=>{
    stopTrenSound();
    trainEl.classList.remove('running');trainEl.style.transition='none';trainEl.style.left='-650px';
    setTimeout(()=>{running=false;btn.disabled=false;},200);
  },8800);
}
